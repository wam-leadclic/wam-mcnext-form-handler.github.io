<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto v4</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
        }
        form {
            background: #ffffff;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .checkbox-group input {
            margin-right: 10px;
        }
        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
        }
        button {
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .tracking-fields {
            background-color: #f9f9f9;
            padding: 15px;
            border: 1px dashed #ccc;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .tracking-fields h3 {
            margin-top: 0;
            font-size: 14px;
            color: #666;
        }
    </style>
    
</head>
<body>
    <!-- Insert these code snippets into your external site page -->
<script async src="https://leadclic.my.site.com/lp/assets/scripts/external-form-handler-host.min.js" onload="SFDCFormHandler.init('https://leadclic.my.site.com/lp')"></script>

    <form id="MCZRL6AKZHHZG2JHAX3GZ24MWL4M" data-uma-forms="true">
        <h2>Formulario de Contacto</h2>

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="surname">Surname</label>
            <input type="text" id="surname" name="surname" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone">
        </div>

        <div class="form-group">
            <label for="company">Company</label>
            <input type="text" id="company" name="company">
        </div>

        <div class="form-group">
            <label for="country_c">Country c</label>
            <input type="text" id="country_c" name="Country_c">
        </div>

        <div class="form-group">
            <label for="tell_us_more">Tell us more</label>
            <textarea id="tell_us_more" name="tell_us_more" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="how_we_can_help_you">How we can help you</label>
            <textarea id="how_we_can_help_you" name="how_we_can_help_you" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="comments">Comments</label>
            <textarea id="comments" name="comments" rows="3"></textarea>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="interesaso_en_wg" name="Interesaso_en_WG">
            <label for="interesado_en_wg">Interesado en WG</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="acepta_politica_privacidad" name="acepta_politica_privacidad" required>
            <label for="acepta_politica_privacidad">Acepta política de privacidad *</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="acepta_recibir_comunicaciones" name="acepta_recibir_comunicaciones">
            <label for="acepta_recibir_comunicaciones">Acepta recibir comunicaciones</label>
        </div>

        <div class="tracking-fields">
            <h3>Campos de Tracking (UTMs, GCLID, etc.)</h3>
            <div class="form-group">
                <label for="utm_source_bis">UTM Source bis</label>
                <input type="text" id="utm_source_bis" name="utm_source_bis">
            </div>
            <div class="form-group">
                <label for="utm_medium_bis">UTM Medium bis</label>
                <input type="text" id="utm_medium_bis" name="utm_medium_bis">
            </div>
            <div class="form-group">
                <label for="utm_campaign_bis">UTM Campaign bis</label>
                <input type="text" id="utm_campaign_bis" name="utm_campaign_bis">
            </div>
            <div class="form-group">
                <label for="utm_content_bis">UTM Content bis</label>
                <input type="text" id="utm_content_bis" name="utm_content_bis">
            </div>
            <div class="form-group">
                <label for="url_punto_conversion">URL punto conversión</label>
                <input type="text" id="url_punto_conversion" name="url_punto_conversion">
            </div>
            <div class="form-group">
                <label for="gclid">GCLID</label>
                <input type="text" id="gclid" name="gclid">
            </div>
        </div>

        <button type="submit">Enviar Formulario</button>
    </form>

</body>
</html>
